# Kitty terminal configuration

# Font
font_family      JetBrains Mono Nerd Font
bold_font        JetBrains Mono Nerd Font Bold
italic_font      JetBrains Mono Nerd Font Italic
bold_italic_font JetBrains Mono Nerd Font Bold Italic
font_size        12.0

# Cursor
cursor_shape     block
cursor_blink_interval 0.5

# Scrollback
scrollback_lines 10000

# Mouse hide when typing
mouse_hide_wait 3.0

# Window padding
window_padding_width 8

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
active_tab_foreground   #2E3440
active_tab_background   #81A1C1
inactive_tab_foreground #D8DEE9
inactive_tab_background #4C566A

# Colors (Nord)
foreground #D8DEE9
background #2E3440

# Transparency
background_opacity 0.85
dynamic_background_opacity yes

cursor #D8DEE9

# Normal colors
color0 #3B4252
color1 #BF616A
color2 #A3BE8C
color3 #EBCB8B
color4 #81A1C1
color5 #B48EAD
color6 #88C0D0
color7 #E5E9F0

# Bright colors
color8 #4C566A
color9 #BF616A
color10 #A3BE8C
color11 #EBCB8B
color12 #81A1C1
color13 #B48EAD
color14 #8FBCBB
color15 #ECEFF4

# Shell - Auto-start tmux
shell tmux
